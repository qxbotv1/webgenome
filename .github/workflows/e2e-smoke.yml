name: E2E Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger from Actions tab
  workflow_dispatch:

env:
  BASE_URL: https://webgenome.vercel.app

jobs:
  health-check:
    name: Railway Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Railway /health
        run: node scripts/check-health.mjs

  e2e-smoke:
    name: Dashboard E2E Smoke
    runs-on: ubuntu-latest
    needs: health-check  # Only run E2E if Railway is healthy
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke tests
        run: npx playwright test
        env:
          BASE_URL: ${{ env.BASE_URL }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-screenshots
          path: test-results/
          retention-days: 14
